---
version: 3

includes:
  cli: cli.yml

vars:
  AWS_EXECUTABLE:
    sh: command -v 'aws'

tasks:

  service:check:can-execute:
    desc: check one can execute commands in an ecs service's tasks
    summary: |-
      Check one can execute commands in an ECS service's tasks.
    internal: true
    requires:
      vars:
        - CLUSTER
        - SERVICE_NAME
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmd: >-
      {{.AWS_EXECUTABLE}} ecs list-tasks
      --cluster '{{.CLUSTER}}' --service-name '{{.SERVICE_NAME}}'
      --query 'taskArns' --output 'text'
      | xargs {{.AWS_EXECUTABLE}} ecs describe-tasks --cluster '{{.CLUSTER}}' --output 'yaml'
      --query 'tasks[0] | {
        "managedAgents": containers[].managedAgents[?@.name==`ExecuteCommandAgent`][],
        "enableExecuteCommand": enableExecuteCommand
      }'
      --tasks
  service:execute:
    desc: execute a command in an ecs service's task
    summary: |-
      Execute a command in an ECS service's task.
    internal: true
    interactive: true
    deps:
      - cli:session-manager-plugin:install
    requires:
      vars:
        - CLUSTER
        - CONTAINER_NAME
        - SERVICE_NAME
        - COMMAND
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmd: >-
      {{.AWS_EXECUTABLE}} ecs list-tasks
      --cluster '{{.CLUSTER}}' --service-name '{{.SERVICE_NAME}}'
      --query 'taskArns[0]' --output 'text'
      | xargs -o -I '%%'
      {{.AWS_EXECUTABLE}} ecs execute-command --interactive
      --command '{{.COMMAND}}' --cluster '{{.CLUSTER}}' --container '{{.CONTAINER_NAME}}' --task '%%'
  service:get-shell:
    desc: get a shell in an ecs service's task
    summary: |-
      Get a shell in an ECS service's task.
    internal: true
    interactive: true
    cmd:
      task: service:execute
      vars:
        COMMAND: bash
        CONTAINER_NAME: '{{.CONTAINER_NAME}}'
        SERVICE_NAME: '{{.SERVICE_NAME}}'
  service:get-tasks-ips:
    desc: get the ip addresses of an ecs service's tasks
    summary: |-
      Get the IP addresses of an ECS service's tasks.
    internal: true
    requires:
      vars:
        - CLUSTER
        - SERVICE_NAME
    vars:
      CLUSTER: '{{.CLUSTER}}'
    cmd: >-
      {{.AWS_EXECUTABLE}} ecs list-tasks
      --cluster '{{.CLUSTER}}' --service-name '{{.SERVICE_NAME}}'
      --query 'taskArns[0]' --output 'text'
      | xargs -I '%%'
      {{.AWS_EXECUTABLE}} ecs describe-tasks
      --cluster '{{.CLUSTER}}' --tasks '%%'
      --query "tasks[].attachments[].details[?(@.name=='privateIPv4Address')].value" --output 'text'
  service:restart:
    desc: restart an ecs service's tasks
    summary: |-
      Restart an ECS service's tasks.
    requires:
      vars:
        - AWS_USER
        - CLUSTER
        - SERVICE_NAME
        - REASON
    vars:
      AWS_USER:
        sh: >-
          {{.AWS_EXECUTABLE}} sts get-caller-identity --output 'json'
          | jq -r '.Arn'
      CLUSTER: '{{.CLUSTER | default "staging"}}'
      REASON: 'Entity {{.AWS_USER}} requested manual restart'
    cmd: >-
      {{.AWS_EXECUTABLE}} ecs list-tasks
      --cluster '{{.CLUSTER}}' --service-name '{{.SERVICE_NAME}}'
      --query 'taskArns' --output 'text'
      | xargs -n '1'
      {{.AWS_EXECUTABLE}} ecs stop-task
      --output 'text' --query 'task.lastStatus'
      --cluster '{{.CLUSTER}}' --reason '{{.REASON}}' --task
