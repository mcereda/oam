---
version: 3

tasks:

  session-manager-plugin:download:
    desc: download the session manager plugin for the aws cli
    summary: |-
      Download the session manager plugin for the AWS CLI.
    requires:
      vars:
        - CURL_EXECUTABLE
        - OUTPUT_FILE
    vars:
      CURL_EXECUTABLE:
        sh: which 'curl'
    cmds:
      - platforms:
          - darwin/amd64
        cmd: >-
          {{.CURL_EXECUTABLE}} --continue-at '-' --output '{{.OUTPUT_FILE}}'
          --url 'https://s3.amazonaws.com/session-manager-downloads/plugin/latest/mac/session-manager-plugin.pkg'
      - platforms:
          - darwin/arm64
        cmd: >-
          {{.CURL_EXECUTABLE}} --continue-at '-' --output '{{.OUTPUT_FILE}}'
          --url 'https://s3.amazonaws.com/session-manager-downloads/plugin/latest/mac_arm64/session-manager-plugin.pkg'
  session-manager-plugin:install:
    desc: install the session manager plugin for the aws cli
    summary: |-
      Install the session manager plugin for the AWS CLI.
    cmds:
      - platforms:
          - darwin
        task: session-manager-plugin:install:darwin
  session-manager-plugin:install:darwin:
    desc: install the session manager plugin for the aws cli on mac os x systems
    summary: |-
      Install the session manager plugin for the AWS CLI on Mac OS X systems.
    platforms:
      - darwin
    interactive: true
    vars:
      INSTALLER: /tmp/session-manager-plugin.pkg
    cmds:
      - task: session-manager-plugin:download
        vars:
          OUTPUT_FILE:
            ref: .INSTALLER
      - sudo installer -pkg '/tmp/session-manager-plugin.pkg' -target '/'
      - sudo ln -fs '/usr/local/sessionmanagerplugin/bin/session-manager-plugin' '/usr/local/bin/session-manager-plugin'
    status:
      - test -r '/usr/local/sessionmanagerplugin/bin/session-manager-plugin'
      - test -r '/usr/local/bin/session-manager-plugin'
