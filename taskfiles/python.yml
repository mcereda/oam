---
version: 3

vars:
  PYTHON_VERSION: 3.14
  REQUIREMENTS_FILE: >-
    {{ .ROOT_DIR }}/requirements.txt
  VENV_DIR: >-
    {{ .ROOT_DIR }}/.venv
  # --
  PYTHON_EXECUTABLE:
    sh: which 'python{{.PYTHON_VERSION}}'

tasks:

  venv:create:
    aliases:
      - create-venv
    requires:
      vars:
        - PYTHON_EXECUTABLE
        - PYTHON_VERSION
        - REQUIREMENTS_FILE
        - VENV_DIR
    cmds:
      - >-
          {{.PYTHON_EXECUTABLE}} -m 'venv' '{{.VENV_DIR}}'
      - >-
          {{.VENV_DIR}}/bin/pip --require-virtualenv install -r '{{.REQUIREMENTS_FILE}}'
  venv:recreate:
    aliases:
      - recreate-venv
    requires:
      vars:
        - VENV_DIR
    cmds:
      - >-
          rm -rf '{{.VENV_DIR}}'
      - task: create-venv
  venv:update:
    aliases:
      - update-venv
    requires:
      vars:
        - REQUIREMENTS_FILE
        - VENV_DIR
    cmds:
      - >-
          {{.VENV_DIR}}/bin/pip freeze --local --require-virtualenv
          | sed 's/==/>=/'
          | xargs {{.VENV_DIR}}/bin/pip --require-virtualenv install --upgrade
      - >-
          {{.VENV_DIR}}/bin/pip list --require-virtualenv --local --not-required --format freeze
          > '{{ .REQUIREMENTS_FILE }}'
