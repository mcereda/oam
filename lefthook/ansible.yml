---
# No official docker images are available at the time of writing, falling back to the local command.


templates:
  ansible_lint_bin: .venv/bin/ansible-lint
  ansible_playbook_bin: .venv/bin/ansible-playbook
  venv_dir: .venv


bootstrap:
  commands:
    ansible-lint:
      run: >-
        test -d '{venv_dir}' || python3 -m 'venv' '{venv_dir}'
        && {venv_dir}/bin/pip install --require-virtualenv 'ansible-lint'

lint:
  commands:
    ansible: &ansible-lint
      files: find . -type f -path "*ansible*" -not -path "*venv*"
      glob: '*.{yaml,yml}'
      run: '{ansible_lint_bin} {files}'

validate:
  commands:
    ansible-playbook: &ansible-playbook-syntax-check
      glob: "*.{yaml,yml}"
      run: >-
        {ansible_playbook_bin} -i 'localhost,' --syntax-check
        {all_files}


pre-commit:
  commands:
    lint-ansible:
      <<: *ansible-lint
      run: '{ansible_lint_bin} {staged_files}'
    validate-ansible:
      <<: *ansible-playbook-syntax-check
      run: >-
        {ansible_playbook_bin} -i 'localhost,' --syntax-check
        {staged_files}
