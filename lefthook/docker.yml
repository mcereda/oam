---
# Hadolint's official docker image is based on 'scratch', and takes only one input file at a time.
# I have no clue how to fix that at the time of writing so let's just use a command local to the project.


templates:
  hadolint_bin: .venv/bin/hadolint
  venv_dir: .venv


bootstrap:
  commands:
    hadolint:
      run: >-
        test -d '{venv_dir}' || python3 -m 'venv' '{venv_dir}'
        && {venv_dir}/bin/pip install --require-virtualenv 'hadolint-py'

lint:
  commands:
    docker: &hadolint
      glob: "*[Dd]ockerfile*"
      run: '{hadolint_bin} {all_files}'


pre-commit:
  commands:
    lint-docker:
      <<: *hadolint
      run: '{hadolint_bin} {staged_files}'
