---
# No official docker images are available at the time of writing, falling back to the local command.


templates:
  commitlint_bin: node_modules/.bin/commitlint


bootstrap:
  commands:
    commitlint:
      run: >-
        npm install --save-dev '@commitlint/cli' '@commitlint/config-conventional'
        && printf "module.exports = {extends: ['@commitlint/config-conventional']}" > '.commitlintrc.js'

debug:
  commands:
    commitlint-config:
      run: '{commitlint_bin} --print-config'


commit-msg:
  commands:
    lint:
      run: '{commitlint_bin} --edit'
